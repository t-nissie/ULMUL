name: Deploy ULMUL to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ruby をセットアップ
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"   # 必要に応じて変更

      # 依存関係インストール、HTMLファイルを作成、出力をdist/にまとめる
      - run: |
          gem install rake aasm exifr kramdown-parser-gfm math_ml
          rake index.ja.html
          rake index.en.html
          mkdir dist
          mv index.ja.html index.en.html dist/

      # Pages 用 artifact をアップロード
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
